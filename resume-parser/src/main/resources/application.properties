server.port=8084
server.servlet.context-path=/resume-parser

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# MySQL
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:mysql-service}:3306/candidatedb?createDatabaseIfNotExist=true
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Elasticsearch
spring.elasticsearch.uris=http://${ELASTICSEARCH_HOST:elasticsearch-service}:9200

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka-service:9092}
spring.kafka.consumer.group-id=resume-parser-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.value.default.type=com.msgeekforgeeks.resume_parser.kafka.ResumeUploadedEvent
spring.kafka.consumer.properties.spring.json.use.type.headers=false
kafka.topic.resume-uploaded=resume.uploaded

# Consul service discovery
spring.cloud.consul.host=${SPRING_CLOUD_CONSUL_HOST:consul-server.default.svc.cluster.local}
spring.cloud.consul.port=${SPRING_CLOUD_CONSUL_PORT:8500}
spring.cloud.consul.discovery.enabled=true
spring.cloud.consul.discovery.service-name=resume-parser

# Claude API
claude.api.key=${CLAUDE_API_KEY:your-api-key-here}
claude.api.url=https://api.anthropic.com/v1/messages
claude.model=claude-haiku-4-5-20251001
