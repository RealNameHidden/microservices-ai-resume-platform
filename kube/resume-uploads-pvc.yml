apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: resume-uploads-pvc # Shared storage for resume PDFs — used by both candidate-service and resume-parser
spec:
  accessModes:
    - ReadWriteOnce # Single-node read/write — sufficient for Minikube (one node)
  resources:
    requests:
      storage: 1Gi # 1 GB — enough for hundreds of resumes in a demo
