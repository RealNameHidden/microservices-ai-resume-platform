apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka # Deployment for the Kafka broker
  labels:
    app: kafka
spec:
  replicas: 1 # Single broker — sufficient for demo; production would use 3+ for replication
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: bitnami/kafka:3.6 # Bitnami image supports KRaft mode — no Zookeeper needed
          ports:
            - containerPort: 9092 # Broker port — used by producers and consumers inside the cluster
              name: broker
            - containerPort: 9093 # Controller port — KRaft internal consensus (no Zookeeper)
              name: controller
          env:
            # --- KRaft mode (Kafka without Zookeeper) ---
            # Why KRaft? Removes the operational complexity of running a separate Zookeeper pod.
            # Kafka 3.3+ supports KRaft as production-ready.
            - name: KAFKA_CFG_NODE_ID
              value: "0" # Unique broker ID in the cluster
            - name: KAFKA_CFG_PROCESS_ROLES
              value: "broker,controller" # This node acts as both broker and KRaft controller
            - name: KAFKA_CFG_LISTENERS
              value: "PLAINTEXT://:9092,CONTROLLER://:9093"
            - name: KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP
              value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
            - name: KAFKA_CFG_CONTROLLER_QUORUM_VOTERS
              value: "0@kafka-service:9093" # This node is the sole voter in the quorum
            - name: KAFKA_CFG_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            # Advertised listeners — what address producers/consumers connect to
            # Must match the Service name so pods resolve it via kube-dns
            - name: KAFKA_CFG_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka-service:9092"
            # Auto-create topics — candidate-service and resume-parser will create topics on first use
            - name: KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            exec:
              # Check Kafka is accepting connections on the broker port
              command:
                - /bin/sh
                - -c
                - "kafka-broker-api-versions.sh --bootstrap-server localhost:9092"
            initialDelaySeconds: 30 # Kafka takes time to elect a controller
            periodSeconds: 15
            failureThreshold: 5
          volumeMounts:
            - name: kafka-data
              mountPath: /bitnami/kafka # Persist topic data across pod restarts
      volumes:
        - name: kafka-data
          emptyDir: {} # EmptyDir for demo — use a PVC in production to survive pod eviction
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-service # Service name — used in KAFKA_CFG_ADVERTISED_LISTENERS and by Spring Kafka consumers
spec:
  selector:
    app: kafka
  ports:
    - protocol: TCP
      port: 9092 # Broker — producers (candidate-service) and consumers (resume-parser) connect here
      targetPort: 9092
      name: broker
    - protocol: TCP
      port: 9093 # Controller — KRaft internal only
      targetPort: 9093
      name: controller
  type: ClusterIP # Kafka is internal to the cluster — producers/consumers are all in-cluster services
