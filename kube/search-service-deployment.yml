apiVersion: apps/v1
kind: Deployment
metadata:
  name: search # Deployment for the search-service
spec:
  replicas: 2 # Two replicas for availability — stateless service so safe to scale horizontally
  selector:
    matchLabels:
      app: search
  template:
    metadata:
      labels:
        app: search
    spec:
      containers:
        - name: search-service
          image: search-service:0.0.1-SNAPSHOT # Build with: docker build -t search-service:0.0.1-SNAPSHOT .
          ports:
            - containerPort: 8082
              name: http
              protocol: TCP
          env:
            # Consul — service discovery
            - name: SPRING_CLOUD_CONSUL_HOST
              value: "consul-server.default.svc.cluster.local"
            - name: SPRING_CLOUD_CONSUL_PORT
              value: "8500"
            # Elasticsearch — points to the elasticsearch-service ClusterIP
            - name: ELASTICSEARCH_HOST
              value: "elasticsearch-service"
            # Redis — points to the redis-service ClusterIP
            - name: REDIS_HOST
              value: "redis-service"
            # Claude API key — injected from Secret, never hardcoded in the manifest
            - name: CLAUDE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: claude-secret   # matches metadata.name in claude-secret.yml
                  key: CLAUDE_API_KEY
            - name: SPRING_APPLICATION_NAME
              value: "search-service"
          livenessProbe:
            httpGet:
              path: /search-service/actuator/health # Context path prefix is /search-service
              port: 8082
            initialDelaySeconds: 90
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: search-service # Consul will also register this service under this name
spec:
  selector:
    app: search
  ports:
    - protocol: TCP
      port: 8082
      targetPort: 8082
      nodePort: 30082 # Access from host via: minikube ip):30082
  type: NodePort # Exposed externally for testing — same pattern as employee-service
