services:
  mysql-db:
    image: mysql:8
    container_name: mysql-docker-container
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: gfgmicroservicesdemo
    ports:
      - "3306:3306"
    healthcheck:
      test: curl --fail http://mysql-docker-container:3306/ || exit 1
      interval: 40s
      timeout: 30s
      retries: 3

  address-service:
    build: ./address-service
    image: address-service-latest
    depends_on:
      - mysql-db
      - employee-service
    environment:
      - MYSQL_HOST=mysql-db
      - MYSQL_USER=root
      - MYSQL_PASSWORD=password
    ports:
      - "8081:8081"

  employee-service:
    build: ./employee-service
    image: employee-service-latest
    depends_on:
      - mysql-db
    environment:
      - MYSQL_HOST=mysql-db
      - MYSQL_USER=root
      - MYSQL_PASSWORD=password
    ports:
      - "8080:8080"

  # ---------------------------------------------------------------------------
  # Resume Search Platform — infrastructure
  # ---------------------------------------------------------------------------

  kafka:
    image: apache/kafka:3.8.1
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    healthcheck:
      test: curl -f http://localhost:9200/_cluster/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 10

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # ---------------------------------------------------------------------------
  # Resume Search Platform — services
  # ---------------------------------------------------------------------------

  candidate-service:
    build: ./candidate-service
    depends_on:
      - mysql-db
      - kafka
    environment:
      - MYSQL_HOST=mysql-db
      - MYSQL_USER=root
      - MYSQL_PASSWORD=password
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_CLOUD_CONSUL_ENABLED=false
      - SPRING_CLOUD_CONSUL_DISCOVERY_ENABLED=false
      - RESUME_UPLOAD_DIR=/app/uploads
    ports:
      - "8083:8083"
    volumes:
      - resume-uploads:/app/uploads

  resume-parser:
    build: ./resume-parser
    depends_on:
      - mysql-db
      - kafka
      - elasticsearch
    environment:
      - MYSQL_HOST=mysql-db
      - MYSQL_USER=root
      - MYSQL_PASSWORD=password
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - ELASTICSEARCH_HOST=elasticsearch
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-not-set}
      - SPRING_CLOUD_CONSUL_ENABLED=false
      - SPRING_CLOUD_CONSUL_DISCOVERY_ENABLED=false
    volumes:
      - resume-uploads:/app/uploads

  search-service:
    build: ./search-service
    depends_on:
      - elasticsearch
      - redis
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - ELASTICSEARCH_HOST=elasticsearch
      - REDIS_HOST=redis
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-not-set}
    ports:
      - "8082:8082"

volumes:
  resume-uploads:
