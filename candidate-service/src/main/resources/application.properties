server.port=8083
server.servlet.context-path=/candidate-service

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# MySQL
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:mysql-service}:3306/candidatedb?createDatabaseIfNotExist=true
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka-service:9092}
kafka.topic.resume-uploaded=resume.uploaded

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Consul service discovery
spring.cloud.consul.host=${SPRING_CLOUD_CONSUL_HOST:consul-server.default.svc.cluster.local}
spring.cloud.consul.port=${SPRING_CLOUD_CONSUL_PORT:8500}
spring.cloud.consul.discovery.enabled=true
spring.cloud.consul.discovery.service-name=candidate-service
