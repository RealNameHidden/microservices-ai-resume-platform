server.port=8082
server.servlet.context-path=/search-service

# Actuator health probes
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# Elasticsearch
spring.elasticsearch.uris=http://${ELASTICSEARCH_HOST:elasticsearch-service}:9200

# Redis
spring.data.redis.host=${REDIS_HOST:redis-service}
spring.data.redis.port=6379

# Redis cache TTL in seconds (10 minutes)
search.cache.ttl-seconds=600

# Consul service discovery
spring.cloud.consul.host=${SPRING_CLOUD_CONSUL_HOST:consul-server.default.svc.cluster.local}
spring.cloud.consul.port=${SPRING_CLOUD_CONSUL_PORT:8500}
spring.cloud.consul.discovery.enabled=true
spring.cloud.consul.discovery.service-name=search-service

# Claude API
claude.api.key=${CLAUDE_API_KEY:your-api-key-here}
claude.api.url=https://api.anthropic.com/v1/messages
claude.model=claude-haiku-4-5-20251001
