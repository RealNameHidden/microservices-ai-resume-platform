# ---------------------------------------------------------------
# Local dev overrides — active when spring.profiles.active=local
# ---------------------------------------------------------------

# Point at ES running locally (via docker-compose or minikube port-forward)
spring.elasticsearch.uris=http://localhost:9200

# Point at Redis running locally
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Disable Consul registration — no Consul running locally
spring.cloud.consul.discovery.enabled=false
spring.cloud.consul.enabled=false

# Claude API key not needed — ClaudeServiceStub is active in the local profile
claude.api.key=not-needed-stub-is-active
